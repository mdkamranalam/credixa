name: Production CI/CD Deployment Pipeline

on:
  push:
    branches: [ "main", "production" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test-and-lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend-gateway/package-lock.json

      - name: Install Backend Gateway Dependencies
        working-directory: ./backend-gateway
        run: npm ci

      - name: Run Gateway Linting & Automated Tests
        working-directory: ./backend-gateway
        run: |
          npm test --if-present

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Risk Engine Dependencies
        working-directory: ./risk-engine
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Verify Python MLOps Drift Script Syntax
        working-directory: ./risk-engine
        run: |
          python -m py_compile evaluate_drift.py

  build-and-push-containers:
    needs: test-and-lint
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/production'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Configure AWS Credentials Placeholder
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-south-1

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push Gateway image to Amazon ECR
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: credixa-backend-gateway
          IMAGE_TAG: ${{ github.sha }}
        working-directory: ./backend-gateway
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG -t $ECR_REGISTRY/$ECR_REPOSITORY:latest .
          # docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG

      - name: Build, tag, and push Risk Engine image to Amazon ECR
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: credixa-risk-engine
          IMAGE_TAG: ${{ github.sha }}
        working-directory: ./risk-engine
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG -t $ECR_REGISTRY/$ECR_REPOSITORY:latest .
          # docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG

  deploy-frontend-cdn:
    needs: test-and-lint
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/production'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Frontend Dependencies & Build
        working-directory: ./frontend
        run: |
          npm install
          npm run build
        env:
          VITE_API_URL: https://api.credixa.com/api

      - name: Deploy to AWS S3 & Invalidate CloudFront
        run: |
          echo "Simulating AWS S3 sync dist/ to s3://credixa-frontend-app"
          echo "Simulating AWS CloudFront invalidation /*"
