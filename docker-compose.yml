services:
  # 1. PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: credixa-postgres
    environment:
      POSTGRES_USER: credixa_admin
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD must be set in environment}
      POSTGRES_DB: credixa_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U credixa_admin -d credixa_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  # 1.5 PgBouncer Connection Pooler
  pgbouncer:
    image: edoburu/pgbouncer:latest
    container_name: credixa-pgbouncer
    environment:
      - DB_USER=credixa_admin
      - DB_PASSWORD=${DB_PASSWORD:?DB_PASSWORD must be set in environment}
      - DB_HOST=credixa-postgres
      - DB_NAME=credixa_db
      - AUTH_TYPE=scram-sha-256
      - POOL_MODE=transaction
      - MAX_CLIENT_CONN=100
      - DEFAULT_POOL_SIZE=20
    ports:
      - "6432:5432"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  # 2. Node.js Gateway
  backend:
    build: ./backend-gateway
    ports:
      - "3000:3000"
    depends_on:
      pgbouncer:
        condition: service_started
      postgres:
        condition: service_healthy
      risk-engine:
        condition: service_healthy
    env_file:
      - ./backend-gateway/.env
    environment:
      - DB_HOST=credixa-postgres
      - DB_PASSWORD=${DB_PASSWORD:?DB_PASSWORD must be set in environment}
      - RISK_ENGINE_URL=http://risk-engine:8000/analyze-statement
    volumes:
      - ./backend-gateway:/app
      - /app/node_modules

  # 3. Python Risk Engine
  risk-engine:
    build: ./risk-engine
    environment:
      - RISK_ENGINE_API_KEY=${RISK_ENGINE_API_KEY:?RISK_ENGINE_API_KEY must be set in environment}
    volumes:
      - ./risk-engine:/app
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  frontend:
    build: ./frontend
    ports:
      - "5173:5173"
    env_file:
      - ./frontend/.env
    volumes:
      - ./frontend:/app
      - /app/node_modules
    stdin_open: true
    tty: true

  # 5. Redis for Caching
  redis:
    image: redis:7-alpine
    container_name: credixa-redis
    ports:
      - "6379:6379"
    restart: unless-stopped
    command: redis-server --appendonly yes --appendfsync everysec
    volumes:
      - redisdata:/data

volumes:
  pgdata:
  redisdata:
